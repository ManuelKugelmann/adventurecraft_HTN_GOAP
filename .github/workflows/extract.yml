name: Extract

on:
  schedule:
    - cron: '0 2 * * *'  # daily 2am UTC
  workflow_dispatch:
    inputs:
      source:
        description: 'Source to extract from'
        required: true
        default: 'everyday'
        type: choice
        options:
          # Narrative
          - propp
          - tvtropes
          - folklore
          - booker
          - campbell
          - tobias
          - polti
          - snyder
          - dramatica
          # Game AI
          - dwarf_fortress
          - rimworld
          - goap_strips
          - utility_ai
          - paradox
          - sims
          - civ
          - gym_envs
          # Behavioral Science
          - maslow
          - bdi
          - goffman
          - game_theory
          - org_behavior
          - strategy
          # Domain Catalogs
          - everyday
          - military
          - world_rules
          - medieval_guilds
          - dnd_srd
          - gurps
          - wikipedia
          - wikidata
      batch_size:
        description: 'Number of items to extract'
        required: false
        default: '5'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine source
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "source=${{ inputs.source }}" >> $GITHUB_OUTPUT
            echo "batch=${{ inputs.batch_size }}" >> $GITHUB_OUTPUT
          else
            # Rotate through sources by day of month (30 sources)
            DAY=$(date +%d)
            SOURCES=(
              everyday propp military world_rules tvtropes folklore
              booker campbell tobias polti snyder dramatica
              dwarf_fortress rimworld goap_strips paradox sims civ
              maslow game_theory strategy medieval_guilds dnd_srd
              goffman org_behavior bdi utility_ai gurps wikipedia wikidata
              everyday
            )
            IDX=$(( (DAY - 1) % ${#SOURCES[@]} ))
            echo "source=${SOURCES[$IDX]}" >> $GITHUB_OUTPUT
            echo "batch=5" >> $GITHUB_OUTPUT
          fi

      - name: Extract batch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python tools/extract.py \
            --source ${{ steps.params.outputs.source }} \
            --batch ${{ steps.params.outputs.batch }}

      - name: Validate and auto-fix (up to 5 retries per file)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # Exit 1 means some files landed in failed/ heap — not a job failure.
        # Those files are committed in the PR for human review.
        continue-on-error: true
        run: |
          python tools/fix_errors.py \
            data/raw/${{ steps.params.outputs.source }}/ \
            --retries 5

      - name: Validate (final gate — excludes failed/ heap)
        run: |
          SOURCE="${{ steps.params.outputs.source }}"
          # Only validate top-level .acf files; skip the failed/ subdir.
          VALID=$(find data/raw/${SOURCE} -maxdepth 1 -name "*.acf" 2>/dev/null | sort)
          if [ -z "$VALID" ]; then
            echo "No valid .acf files to validate — nothing to commit."
            exit 0
          fi
          python tools/validate.py $VALID

      - name: Ensure extraction label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "extraction" \
            --color "#0075ca" \
            --description "Automated extraction PR" \
            2>/dev/null || true

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE="${{ steps.params.outputs.source }}"
          BATCH="${{ steps.params.outputs.batch }}"
          BRANCH="extract/${SOURCE}-$(date +%Y%m%d)"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add data/raw/

          NEW=$(git diff --cached --name-only -- 'data/raw/*.acf' 'data/raw/**/*.acf' | grep -v '/failed/' | wc -l)
          FAILED=$(git diff --cached --name-only -- 'data/raw/*/failed/*.acf' | wc -l)

          if [ "$NEW" -eq 0 ] && [ "$FAILED" -eq 0 ]; then
            echo "No new files extracted. Skipping PR."
            exit 0
          fi

          git commit -m "$(cat <<EOF
data: extract ${NEW} items from ${SOURCE} (${FAILED} in failed heap)

Source: ${SOURCE}
Batch: ${BATCH}
Valid: ${NEW} new .acf files
Failed heap: ${FAILED} files needing manual review
EOF
)"

          git push -u origin "$BRANCH"

          gh pr create \
            --title "Extract: ${SOURCE} $(date +%Y-%m-%d)" \
            --body "$(cat <<EOF
Automated extraction from \`${SOURCE}\`.

**Valid files:** ${NEW}
**Failed heap (\`failed/\`):** ${FAILED} — could not be auto-fixed after 5 retries; needs manual review or re-extraction
**Validation:** passed for valid files

Review and merge to move to verification queue.
EOF
)" \
            --label extraction
